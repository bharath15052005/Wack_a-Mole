<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Whack-a-Mole</h1>

        <div class="info">
            <p>Score: <span id="score">0</span></p>
            <p>Time: <span id="timer">30</span>s</p>
        </div>

        <button id="startBtn">Start Game</button>

        <div class="board" id="board">
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
        </div>

        <h2 id="result"></h2>
    </div>
 <script src="script.js"></script>
</body>
</html>
